<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL → SAS Passthrough</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1a1b1e;
      --surface:    #222327;
      --border:     #2e2f34;
      --border-hi:  #454750;
      --text:       #d4d5d9;
      --text-dim:   #6b6d75;
      --accent:     #5b8af5;
      --accent-hi:  #7aa3ff;
      --warn-bg:    #2a2318;
      --warn-border:#5a4a1a;
      --warn-text:  #c9a84c;
      --error-bg:   #2a1a1a;
      --error-border:#5a2020;
      --error-text: #d45f5f;
      --ok-text:    #6abf7b;
      --mono:       'JetBrains Mono', monospace;
      --sans:       'IBM Plex Sans', sans-serif;
      --header-h:   48px;
      --footer-h:   36px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      overflow: hidden;
    }

    /* ── layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── header bar ── */
    header {
      flex: 0 0 var(--header-h);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    header h1 span {
      color: var(--accent);
    }

    .spacer { flex: 1; }

    .conn-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .conn-group label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .conn-group input,
    .conn-group select {
      font-family: var(--mono);
      font-size: 11px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 6px;
      border-radius: 3px;
      width: 90px;
      outline: none;
      transition: border-color 0.15s;
    }

    .conn-group input:focus,
    .conn-group select:focus {
      border-color: var(--accent);
    }

    .conn-group input::placeholder {
      color: var(--text-dim);
      opacity: 0.6;
    }

    .conn-group select {
      width: auto;
      padding: 4px 6px;
    }

    .conn-group select option {
      background: var(--surface);
      color: var(--text);
    }

    #translate-btn {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 6px 16px;
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s, opacity 0.15s;
    }

    #translate-btn:hover  { background: var(--accent-hi); }
    #translate-btn:active { opacity: 0.8; }
    #translate-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── editor row ── */
    #editors {
      flex: 1 1 0;
      display: flex;
      min-height: 0;
      border-bottom: 1px solid var(--border);
    }

    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .pane + .pane {
      border-left: 1px solid var(--border);
    }

    .pane-label {
      flex: 0 0 28px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      user-select: none;
      gap: 8px;
    }

    .pane-label .count {
      margin-left: auto;
      color: var(--ok-text);
      font-size: 10px;
    }

    textarea {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.6;
      padding: 14px 16px;
      tab-size: 4;
      caret-color: var(--accent);
    }

    textarea::selection {
      background: rgba(91, 138, 245, 0.25);
    }

    textarea[readonly] {
      color: #a8c4a8;   /* slightly green-tinted for output */
    }

    /* copy button inside output pane label */
    #copy-btn {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 10px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 2px 8px;
      border-radius: 2px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: border-color 0.15s, color 0.15s;
    }

    #copy-btn:hover {
      border-color: var(--border-hi);
      color: var(--text);
    }

    #copy-btn.copied {
      color: var(--ok-text);
      border-color: var(--ok-text);
    }

    /* ── warnings / status footer ── */
    #footer {
      flex: 0 0 auto;
      max-height: 30vh;
      overflow-y: auto;
      display: none;   /* hidden until there's something to show */
    }

    #footer.visible {
      display: block;
    }

    #footer-inner {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
    }

    .footer-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .footer-label.warn  { color: var(--warn-text); }
    .footer-label.error { color: var(--error-text); }

    .warning-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .warning-list li {
      font-family: var(--mono);
      font-size: 11.5px;
      color: var(--warn-text);
      background: var(--warn-bg);
      border-left: 2px solid var(--warn-border);
      padding: 5px 10px;
      border-radius: 0 2px 2px 0;
    }

    .error-msg {
      font-family: var(--mono);
      font-size: 11.5px;
      color: var(--error-text);
      background: var(--error-bg);
      border-left: 2px solid var(--error-border);
      padding: 5px 10px;
      border-radius: 0 2px 2px 0;
    }

    /* ── status bar ── */
    #statusbar {
      flex: 0 0 var(--footer-h);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    #statusbar .stat { display: flex; gap: 5px; }
    #statusbar .stat .val { color: var(--text); }
    #statusbar .stat.ok  .val { color: var(--ok-text); }
    #statusbar .stat.warn .val { color: var(--warn-text); }
    #statusbar #status-msg { margin-left: auto; }
  </style>
</head>
<body>
<div id="app">

  <!-- header -->
  <header>
    <h1>sql <span>→</span> sas passthrough</h1>
    <div class="spacer"></div>
    <div class="conn-group">
      <label for="select-mode">SELECT</label>
      <select id="select-mode">
        <option value="comment" selected>as comment</option>
        <option value="dataset">as dataset</option>
        <option value="ignore">ignore</option>
      </select>
      <label for="conn-name" style="margin-left: 12px;">alias</label>
      <input id="conn-name" type="text" value="myconn" spellcheck="false" autocomplete="off" placeholder="Connection alias" />
      <label for="conn-dbtype" style="margin-left: 12px;">dbtype</label>
      <input id="conn-dbtype" type="text" value="oracle" spellcheck="false" autocomplete="off" placeholder="e.g. oracle" />
      <label for="conn-dsn" style="margin-left: 12px;">dsn</label>
      <input id="conn-dsn" type="text" value="" spellcheck="false" autocomplete="off" placeholder="e.g. ABC_DSN" />
      <label for="conn-authdomain" style="margin-left: 12px;">authdomain</label>
      <input id="conn-authdomain" type="text" value="" spellcheck="false" autocomplete="off" placeholder="e.g. domain" />
      <label for="conn-type" style="margin-left: 12px;">conntype</label>
      <input id="conn-type" type="text" value="global" spellcheck="false" autocomplete="off" placeholder="e.g. global" />
    </div>
    <button id="translate-btn">Translate</button>
  </header>

  <!-- editors -->
  <div id="editors">
    <div class="pane">
      <div class="pane-label">SQL input</div>
      <textarea id="sql-input" spellcheck="false" placeholder="Paste your SQL here…"></textarea>
    </div>
    <div class="pane">
      <div class="pane-label">
        SAS output
        <button id="copy-btn">copy</button>
      </div>
      <textarea id="sas-output" readonly spellcheck="false" placeholder="Generated SAS will appear here…"></textarea>
    </div>
  </div>

  <!-- warnings / errors -->
  <div id="footer">
    <div id="footer-inner"></div>
  </div>

  <!-- status bar -->
  <div id="statusbar">
    <div class="stat" id="stat-total">  <span>statements</span><span class="val" id="val-total">—</span></div>
    <div class="stat ok"  id="stat-wrapped"><span>wrapped</span>  <span class="val" id="val-wrapped">—</span></div>
    <div class="stat warn" id="stat-skipped"><span>skipped</span>  <span class="val" id="val-skipped">—</span></div>
    <span id="status-msg"></span>
  </div>

</div>

<script>
  const sqlInput    = document.getElementById('sql-input');
  const sasOutput   = document.getElementById('sas-output');
  const selectMode  = document.getElementById('select-mode');
  const connName    = document.getElementById('conn-name');
  const connDbtype  = document.getElementById('conn-dbtype');
  const connDsn     = document.getElementById('conn-dsn');
  const connAuthdomain = document.getElementById('conn-authdomain');
  const connType    = document.getElementById('conn-type');
  const btn         = document.getElementById('translate-btn');
  const copyBtn     = document.getElementById('copy-btn');
  const footer      = document.getElementById('footer');
  const footerInner = document.getElementById('footer-inner');
  const statusMsg   = document.getElementById('status-msg');
  const valTotal    = document.getElementById('val-total');
  const valWrapped  = document.getElementById('val-wrapped');
  const valSkipped  = document.getElementById('val-skipped');
  const statSkipped = document.getElementById('stat-skipped');

  function clearFooter() {
    footerInner.innerHTML = '';
    footer.classList.remove('visible');
  }

  function showWarnings(warnings) {
    if (!warnings.length) return;
    footerInner.innerHTML = `
      <div class="footer-label warn">⚠ warnings (${warnings.length})</div>
      <ul class="warning-list">
        ${warnings.map(w => `<li>${escHtml(w)}</li>`).join('')}
      </ul>`;
    footer.classList.add('visible');
  }

  function showError(msg) {
    footerInner.innerHTML = `
      <div class="footer-label error">✕ error</div>
      <div class="error-msg">${escHtml(msg)}</div>`;
    footer.classList.add('visible');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function resetStats() {
    valTotal.textContent = '—';
    valWrapped.textContent = '—';
    valSkipped.textContent = '—';
    statSkipped.classList.remove('warn');
    statusMsg.textContent = '';
  }

  function setStats(counts, warnCount) {
    valTotal.textContent   = counts.total;
    valWrapped.textContent = counts.wrapped;
    valSkipped.textContent = counts.skipped;
    if (counts.skipped > 0) statSkipped.classList.add('warn');
    else statSkipped.classList.remove('warn');
    statusMsg.textContent = warnCount
      ? `${warnCount} warning${warnCount > 1 ? 's' : ''}`
      : 'ok';
    statusMsg.style.color = warnCount ? 'var(--warn-text)' : 'var(--ok-text)';
  }

  async function doTranslate() {
    const sql  = sqlInput.value.trim();
    const mode = selectMode.value;
    const connParams = {
      name: connName.value.trim() || 'myconn',
      dbtype: connDbtype.value.trim() || 'oracle',
      dsn: connDsn.value.trim(),
      authdomain: connAuthdomain.value.trim(),
      conntype: connType.value.trim() || 'global'
    };

    if (!sql) {
      showError('No SQL to translate.');
      return;
    }

    clearFooter();
    resetStats();
    btn.disabled = true;
    statusMsg.textContent = 'translating…';
    statusMsg.style.color = 'var(--text-dim)';

    try {
      const resp = await fetch('/translate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sql, conn: connParams, select_mode: mode }),
      });

      const data = await resp.json();

      if (!resp.ok) {
        sasOutput.value = '';
        showError(data.error || 'Unknown error.');
        resetStats();
        return;
      }

      sasOutput.value = data.sas;
      showWarnings(data.warnings);
      setStats(data.counts, data.warnings.length);

    } catch (err) {
      showError('Request failed: ' + err.message);
      resetStats();
    } finally {
      btn.disabled = false;
    }
  }

  // translate on button click
  btn.addEventListener('click', doTranslate);

  // Ctrl/Cmd+Enter shortcut
  sqlInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      doTranslate();
    }
  });

  // copy button
  copyBtn.addEventListener('click', () => {
    const text = sasOutput.value;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      copyBtn.textContent = 'copied!';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = 'copy';
        copyBtn.classList.remove('copied');
      }, 1500);
    });
  });
</script>
</body>
</html>
