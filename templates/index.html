<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL → SAS Passthrough</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml" />
</head>
<body>
<div id="app" class="container-fluid p-0">

  <!-- header -->
  <header class="flex items-center justify-between gap-4 p-4 h-16">
    <h1 class="text-sm font-mono">sql <span>→</span> sas passthrough</h1>
    <form class="flex items-center gap-2 conn-group" onsubmit="return false;">
      <div class="mr-2">
        <label for="select-mode" class="form-label visually-hidden">How to do with SELECT?</label>
        <select id="select-mode" class="form-control w-28 md:w-36">
          <option value="comment" selected>as comment</option>
          <option value="dataset">as dataset</option>
          <option value="ignore">ignore</option>
        </select>
      </div>

      <div class="mr-2">
        <label for="conn-name" class="form-label visually-hidden">alias</label>
        <input id="conn-name" class="form-control w-36 md:w-48" type="text" value="myconn" spellcheck="false" autocomplete="off" placeholder="alias" />
      </div>

      <div class="mr-2">
        <label for="conn-dbtype" class="form-label visually-hidden">dbtype</label>
        <input id="conn-dbtype" class="form-control w-28 md:w-36" type="text" value="oracle" spellcheck="false" autocomplete="off" placeholder="dbtype" />
      </div>

      <div class="mr-2">
        <label for="conn-dsn" class="form-label visually-hidden">dsn</label>
        <input id="conn-dsn" class="form-control w-36 md:w-48" type="text" value="" spellcheck="false" autocomplete="off" placeholder="dsn" />
      </div>

      <div class="mr-2">
        <label for="conn-authdomain" class="form-label visually-hidden">authdomain</label>
        <input id="conn-authdomain" class="form-control w-36 md:w-48" type="text" value="" spellcheck="false" autocomplete="off" placeholder="authdomain" />
      </div>

      <div class="mr-2">
        <label for="conn-type" class="form-label visually-hidden">conntype</label>
        <input id="conn-type" class="form-control w-28 md:w-36" type="text" value="global" spellcheck="false" autocomplete="off" placeholder="conntype" />
      </div>

      <button id="translate-btn" class="translate-btn bg-blue-600 text-white ml-2">Translate</button>
    </form>
  </header>

  <!-- editors -->
  <div id="editors" class="flex-1 flex min-h-0">
    <div class="pane w-full md:w-1/2 flex flex-col min-h-0">
      <div class="pane-label flex items-center justify-between">SQL input</div>
      <textarea id="sql-input" class="form-control flex-1 min-h-0 h-full resize-none" spellcheck="false" placeholder="Paste your SQL here…"></textarea>
    </div>
    <div class="pane w-full md:w-1/2 flex flex-col min-h-0">
      <div class="pane-label flex items-center justify-between">
        <span>SAS output</span>
        <button id="copy-btn" class="copy-btn">copy</button>
      </div>
      <textarea id="sas-output" class="form-control output flex-1 min-h-0 h-full resize-none" readonly spellcheck="false" placeholder="Generated SAS will appear here…"></textarea>
    </div>
  </div>

  <!-- warnings / errors -->
  <div id="footer">
    <div id="footer-inner"></div>
  </div>

  <!-- status bar -->
  <div id="statusbar">
    <div class="stat" id="stat-total">  <span>statements</span><span class="val" id="val-total">—</span></div>
    <div class="stat ok"  id="stat-wrapped"><span>wrapped</span>  <span class="val" id="val-wrapped">—</span></div>
    <div class="stat warn" id="stat-skipped"><span>skipped</span>  <span class="val" id="val-skipped">—</span></div>
    <div class="stat warn" id="stat-warnings"><span>warnings</span> <span class="val" id="val-warnings">—</span></div>
    <span id="status-msg"></span>
  </div>

</div>

<script>
  const sqlInput    = document.getElementById('sql-input');
  const sasOutput   = document.getElementById('sas-output');
  const selectMode  = document.getElementById('select-mode');
  const connName    = document.getElementById('conn-name');
  const connDbtype  = document.getElementById('conn-dbtype');
  const connDsn     = document.getElementById('conn-dsn');
  const connAuthdomain = document.getElementById('conn-authdomain');
  const connType    = document.getElementById('conn-type');
  const btn         = document.getElementById('translate-btn');
  const copyBtn     = document.getElementById('copy-btn');
  const footer      = document.getElementById('footer');
  const footerInner = document.getElementById('footer-inner');
  const statusMsg   = document.getElementById('status-msg');
  const valTotal    = document.getElementById('val-total');
  const valWrapped  = document.getElementById('val-wrapped');
  const valSkipped  = document.getElementById('val-skipped');
  const statSkipped = document.getElementById('stat-skipped');

  function clearFooter() {
    footerInner.innerHTML = '';
    footer.classList.remove('visible');
  }

  function showWarnings(warnings) {
    if (!warnings.length) return;
    footerInner.innerHTML = `
      <div class="footer-label warn" id="warnings-toggle">
        <span class="footer-toggle">▼</span>
        <span>⚠ warnings (${warnings.length})</span>
      </div>
      <ul class="warning-list" id="warnings-list">
        ${warnings.map(w => `<li>${escHtml(w)}</li>`).join('')}
      </ul>`;
    footer.classList.add('visible');
    
    // Add toggle functionality
    const toggle = document.getElementById('warnings-toggle');
    const list = document.getElementById('warnings-list');
    const toggleIcon = toggle.querySelector('.footer-toggle');
    // start collapsed
    list.classList.add('collapsed');
    toggleIcon.classList.add('collapsed');

    toggle.addEventListener('click', () => {
      list.classList.toggle('collapsed');
      toggleIcon.classList.toggle('collapsed');
    });
  }

  function showError(msg) {
    footerInner.innerHTML = `
      <div class="footer-label error">✕ error</div>
      <div class="error-msg">${escHtml(msg)}</div>`;
    footer.classList.add('visible');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function resetStats() {
    valTotal.textContent = '—';
    valWrapped.textContent = '—';
    valSkipped.textContent = '—';
    statSkipped.classList.remove('warn');
    statusMsg.textContent = '';
  }

  function setStats(counts, warnCount) {
    valTotal.textContent   = counts.total;
    valWrapped.textContent = counts.wrapped;
    valSkipped.textContent = counts.skipped;
    const valWarnings = document.getElementById('val-warnings');
    if (valWarnings) valWarnings.textContent = warnCount;
    if (counts.skipped > 0) statSkipped.classList.add('warn');
    else statSkipped.classList.remove('warn');
    statusMsg.textContent = warnCount
      ? `${warnCount} warning${warnCount > 1 ? 's' : ''}`
      : 'ok';
    statusMsg.style.color = warnCount ? 'var(--warn-text)' : 'var(--ok-text)';
  }

  async function doTranslate() {
    const sql  = sqlInput.value.trim();
    const mode = selectMode.value;
    const connParams = {
      name: connName.value.trim() || 'myconn',
      dbtype: connDbtype.value.trim() || 'oracle',
      dsn: connDsn.value.trim(),
      authdomain: connAuthdomain.value.trim(),
      conntype: connType.value.trim() || 'global'
    };

    if (!sql) {
      showError('No SQL to translate.');
      return;
    }

    clearFooter();
    resetStats();
    btn.disabled = true;
    statusMsg.textContent = 'translating…';
    statusMsg.style.color = 'var(--text-dim)';

    try {
      const resp = await fetch('/translate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sql,
          conn: connParams,
          select_mode: mode,
        }),
      });

      const data = await resp.json();

      if (!resp.ok) {
        sasOutput.value = '';
        showError(data.error || 'Unknown error.');
        resetStats();
        return;
      }

      sasOutput.value = data.sas;
      showWarnings(data.warnings);
      setStats(data.counts, data.warnings.length);

    } catch (err) {
      showError('Request failed: ' + err.message);
      resetStats();
    } finally {
      btn.disabled = false;
    }
  }

  // translate on button click
  btn.addEventListener('click', doTranslate);

  // Ctrl/Cmd+Enter shortcut
  sqlInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      doTranslate();
    }
  });

  // copy button
  copyBtn.addEventListener('click', () => {
    const text = sasOutput.value;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      copyBtn.textContent = 'copied!';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = 'copy';
        copyBtn.classList.remove('copied');
      }, 1500);
    });
  });
</script>
</body>
</html>
